<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>日干支 checker</title>
<style>
  :root{
    --ink:#333; --brand:#ff68b6;
    --field-fg:#555; --field-size:16px; --field-weight:400;
    --field-border:#cfd6e0; --field-radius:8px; --field-height:38px;
    --field-pad-x:10px; --caret-color:#7aa8ff;
    --nav-btn-bg:#ff68b6; --nav-btn-fg:#fff;
    --support-offset: 25px;
    --gap-kanshi-reading:-4px;

    --result-min:32px;
    --reading-min:18px;
    --persona-min:22px;
    --persona-size:14px; --persona-weight:600;

    --panel-radius:20px;
  }

  html,body{ margin:0; padding:0; height:100%; -webkit-text-size-adjust:100%; color:var(--ink); }
  body{
    font-family:'Hiragino Kaku Gothic ProN', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
    text-align:center;
    background:url('iloiloback.jpg') no-repeat center/cover;
  }

  /* ── 右上：テキストのヘッダーメニュー（カレンダーと同じノリ） ── */
  .headnav{
    width:min(720px,92vw);
    margin:8px auto 0;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    font-family:'Futura','Avenir Next','Montserrat',sans-serif;
    font-weight:500;
    letter-spacing:.02em;
    font-size:16px;
    color:#666;
  }
  .headnav a{
    color:inherit;
    text-decoration:none;
    padding:0 10px;
    line-height:1;
  }
  .headnav a + a{
    margin-left:10px;
    padding-left:12px;
    border-left:2px solid rgba(0,0,0,.28);
  }
  .headnav a:hover{ color:#333; }

  @media (max-width:420px){
    .headnav{ font-size:13px; }
    .headnav a{ padding:0 8px; }
    .headnav a + a{ margin-left:8px; padding-left:10px; }
  }

  /* ── 本体 ── */
  .wrap{
    min-height:100svh; padding:14px 16px calc(24px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; justify-content:center; align-items:center; gap:18px;
  }
  .card{
    background:rgba(255,255,255,.6);
    border-radius:50%; width:290px; height:290px;
    box-shadow:0 8px 24px rgba(0,0,0,.1);
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    padding:22px;
    flex-shrink:0;
  }
  .logo{ font-family:'Futura','Avenir Next','Montserrat',sans-serif; font-weight:900; font-size:30px; margin:0; }
  .sub{ font-family:'Futura','Avenir Next','Montserrat',sans-serif; font-weight:400; font-size:14px; margin:2px 0 0; color:#666; }

  .row{ display:flex; gap:8px; align-items:center; justify-content:center; margin-top:14px; }
  .field{
    height:var(--field-height);
    border:1px solid var(--field-border); border-radius:var(--field-radius);
    background:#fff; font-size:var(--field-size); font-weight:var(--field-weight);
    color:var(--field-fg); line-height:1;
  }
  .ym-box{ position:relative; display:inline-flex; align-items:center; gap:8px;
    padding:0 calc(var(--field-pad-x) + 18px) 0 var(--field-pad-x); }
  .ym-year,.ym-month,.ym-suffix{ pointer-events:none; user-select:none; }
  .ym-suffix{ opacity:.9; }
  .ym-caret{ position:absolute; right:8px; top:50%; transform:translateY(-50%);
    font-size:10px; color:var(--caret-color); pointer-events:none; }
  .ym-box input[type="month"]{
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0; border:0; background:transparent; appearance:none; -webkit-appearance:none;
    cursor:pointer;
  }
  .day-box{ position:relative; display:inline-block; padding:0 var(--field-pad-x); }
  .day-box select{
    appearance:none; -webkit-appearance:none; outline:none;
    border:0; background:transparent; color:var(--field-fg);
    font-size:var(--field-size); font-weight:var(--field-weight);
    height:100%; padding-right:32px;
  }
  .day-suffix{ position:absolute; right:22px; top:50%; transform:translateY(-50%);
    font-size:var(--field-size); font-weight:var(--field-weight); color:var(--field-fg); opacity:.9; }
  .day-box::after{ content:"▼"; position:absolute; right:8px; top:50%; transform:translateY(-50%);
    font-size:10px; color:var(--caret-color); pointer-events:none; }

  .eto-no{
    margin-top:16px;
    font-family:'Futura','Avenir Next','Montserrat',sans-serif;
    font-weight:700;
    font-size:12px;
    letter-spacing:.08em;
    color:var(--brand);
    min-height:14px;
    line-height:1.2;
  }

  .result{
    margin-top:4px; font-size:28px; font-weight:700;
    min-height:var(--result-min); line-height:1.15;
  }
  .reading{
    margin-top:0; font-size:12px; color:#777;
    min-height:var(--reading-min); line-height:1.2;
  }
  .persona{
    margin-top:10px; font-size:var(--persona-size); font-weight:var(--persona-weight); color:#222;
    min-height:var(--persona-min); line-height:1.2;
  }

  .fade-text { transition: opacity .45s ease-in-out, transform .45s ease-in-out; }
  .fade-text.is-fading-out { opacity:0; transform:translateY(6px); }
  .fade-text.is-fading-in  { opacity:1; transform:translateY(0); }

  .is-initializing .fade-text { transition:none !important; }
  .is-initializing .panel { transition:none !important; }

  /* ── イラストパネル ── */
  .panel{
    width:min(320px,88vw);
    border-radius:var(--panel-radius);
    background:rgba(255,255,255,.55);
    box-shadow:0 8px 24px rgba(0,0,0,.1);
    overflow:hidden;
    opacity:0;
    transform:translateY(10px);
    transition:opacity .5s ease-in-out, transform .5s ease-in-out;
  }
  .panel.is-visible{ opacity:1; transform:translateY(0); }

  .panel-art{
    width:100%;
    aspect-ratio: 4 / 3;
    background-size:cover;
    background-position:center;
    background-color:rgba(255,255,255,.4);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .panel-art.is-pending{
    background-image:none !important;
  }
  .pending-msg{
    font-size:13px;
    color:#888;
    font-weight:500;
    letter-spacing:.02em;
  }
  .pending-msg .pin{ font-size:18px; display:block; margin-bottom:4px; }

  .panel-body{
    padding:14px 16px 18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .panel-link{
    text-decoration:none;
    font-size:13px;
    font-weight:700;
    color:#fff;
    background:var(--brand);
    padding:9px 18px;
    border-radius:999px;
    display:inline-block;
    box-shadow:0 4px 10px rgba(255,104,182,.35);
  }
  .panel-link[aria-disabled="true"]{
    background:#cfd6e0;
    color:#888;
    box-shadow:none;
    pointer-events:none;
  }

  .nav{ margin-top:2px; }
  .nav .to-calendar{
    text-decoration:none; font-size:12px; font-weight:600;
    color:#888; background:transparent; border:1px solid rgba(0,0,0,.18);
    padding:6px 12px; border-radius:999px; display:inline-block;
  }
  .nav .to-calendar:hover{ color:#555; border-color:rgba(0,0,0,.32); }

  .support-footer{ position:fixed; left:0; right:0; bottom:var(--support-offset); z-index:10; text-align:center; }
  .support-btn{
    text-decoration:none; font-size:12px; font-weight:600;
    color:#ff7f50; background:transparent; border:2px solid #ff7f50;
    padding:6px 10px; border-radius:10px; display:inline-block; opacity:.9;
  }
  /* AdSense審査中は非表示 */
  .support-footer { display:none !important; }
</style>
</head>
<body class="is-initializing">

  <!-- 右上ヘッダーメニュー（使い方 | HOME） -->
  <nav class="headnav">
    <a href="https://izuchan.com/nikkanshi-checker-guide/">使い方</a>
    <a href="https://izuchan.com/">HOME</a>
  </nav>

  <div class="wrap">
    <div class="card">
      <h1 class="logo">ilo.ilo</h1>
      <div class="sub">日干支 checker</div>

      <div class="row">
        <span class="field ym-box">
          <span class="ym-year" id="ymYear">----</span>
          <span class="ym-suffix">年</span>
          <span class="ym-month" id="ymMonth">--</span>
          <span class="ym-suffix">月</span>
          <span class="ym-caret">▼</span>
          <input type="month" id="ymInput" />
        </span>
        <span class="field day-box">
          <select id="day"></select>
          <span class="day-suffix">日</span>
        </span>
      </div>

      <div class="eto-no fade-text" id="etoNo">&nbsp;</div>
      <div class="result  fade-text" id="result">&nbsp;</div>
      <div class="reading fade-text" id="reading">&nbsp;</div>
      <div class="persona fade-text" id="persona">&nbsp;</div>
    </div>

    <!-- イラストパネル -->
    <div class="panel" id="panel">
      <div class="panel-art" id="panelArt"></div>
      <div class="panel-body">
        <a class="panel-link" id="panelLink" href="#" rel="noopener noreferrer">この景色を読む</a>
      </div>
    </div>

    <div class="nav">
      <a class="to-calendar" href="https://izuchan.com/iloilo-nikkanshi-calendar/">🗓️ 日干支カレンダーへ</a>
    </div>
  </div>

  <div class="support-footer">
    <a class="support-btn" href="https://ofuse.me/izuiloilo">izuを応援する</a>
  </div>

<script>
  const stems = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
  const stemsReading = ["きのえ","きのと","ひのえ","ひのと","つちのえ","つちのと","かのえ","かのと","みずのえ","みずのと"];
  const branches = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
  const branchesReading = ["ね","うし","とら","う","たつ","み","うま","ひつじ","さる","とり","いぬ","い"];
  const stemPersona = {
    "甲":"🌳樹木タイプ","乙":"🪻草花タイプ","丙":"☀️太陽タイプ","丁":"🔥炎タイプ",
    "戊":"⛰️山タイプ","己":"🪏大地タイプ","庚":"🪨岩・鉄塊タイプ","辛":"💍宝石タイプ",
    "壬":"🌊海・大河タイプ","癸":"☔️雨タイプ"
  };

  /* ── 干支番号（甲子=01〜癸亥=60）──
     六十干支の周期そのままの並び順。
     画像ファイル名は「番号.jpg」（例: 丁亥=24 → 24.jpg）で統一。
  */
  function kanshiNumber(stem, branch){
    const stemIdx = stems.indexOf(stem);
    const branchIdx = branches.indexOf(branch);
    for(let n=0; n<60; n++){
      if(n % 10 === stemIdx && n % 12 === branchIdx){ return n + 1; }
    }
    return null;
  }

  const ILLUSTRATIONS_DIR = "illustrations"; // GitHubリポジトリ内のフォルダ名に合わせて変更可

  /* ── 記事が完成した干支の番号だけ、ここに追加してください ──
     例: 24番（丁亥）の記事ができたら 24: "https://izuchan.com/hinoto-i/" を追加。
     未登録の番号は自動的に「準備中」表示になります。
  */
  const etoArticleUrls = {
    // 24: "https://izuchan.com/hinoto-i/",
    // 17: "https://izuchan.com/kanoe-tatsu/",
  };

  const baseDate = new Date(1984, 2, 31);
  function kanshiIndexFromDate(date){
    const diffDays = Math.floor((date - baseDate)/(1000*60*60*24));
    return (diffDays % 60 + 60) % 60;
  }

  const ymInput = document.getElementById('ymInput');
  const ymYear = document.getElementById('ymYear');
  const ymMonth = document.getElementById('ymMonth');
  const daySel = document.getElementById('day');
  const etoNoEl = document.getElementById('etoNo');
  const resultEl = document.getElementById('result');
  const readingEl = document.getElementById('reading');
  const personaEl = document.getElementById('persona');
  const panelEl = document.getElementById('panel');
  const panelArtEl = document.getElementById('panelArt');
  const panelLinkEl = document.getElementById('panelLink');

  let curYear, curMonth;

  function updateDays(){
    const last = new Date(curYear, curMonth, 0).getDate();
    const keep = +daySel.value || 1;
    daySel.innerHTML='';
    for(let d=1; d<=last; d++){ daySel.add(new Option(d,d)); }
    daySel.value = Math.min(keep, last);
  }
  function updateYmLabel(){
    ymYear.textContent = curYear;
    ymMonth.textContent = curMonth;
  }

  function updatePanel(num){
    const numStr = String(num).padStart(2,'0');
    const url = etoArticleUrls[num];

    // いったんフェードアウト
    panelEl.classList.remove('is-visible');

    setTimeout(()=>{
      if(url){
        panelArtEl.classList.remove('is-pending');
        panelArtEl.style.backgroundImage = `url('${ILLUSTRATIONS_DIR}/${numStr}.jpg')`;
        panelArtEl.innerHTML = '';
        panelLinkEl.href = url;
        panelLinkEl.textContent = 'この景色を読む';
        panelLinkEl.removeAttribute('aria-disabled');
        panelLinkEl.setAttribute('target','_blank');
        panelLinkEl.setAttribute('rel','noopener noreferrer');
      } else {
        panelArtEl.classList.add('is-pending');
        panelArtEl.style.backgroundImage = 'none';
        panelArtEl.innerHTML = '<div class="pending-msg"><span class="pin">🖌️</span>この景色は制作中です</div>';
        panelLinkEl.textContent = '準備中';
        panelLinkEl.href = '#';
        panelLinkEl.setAttribute('aria-disabled','true');
        panelLinkEl.removeAttribute('target');
      }

      requestAnimationFrame(()=>{
        panelEl.classList.add('is-visible');
      });
    }, 260);
  }

  function updateResult(){
    const d = +daySel.value;
    if(!curYear || !curMonth || !d) return;
    const date = new Date(curYear, curMonth-1, d);
    const idx = kanshiIndexFromDate(date);
    const stem=stems[idx%10], branch=branches[idx%12];
    const stemR = stemsReading[idx%10], branchR = branchesReading[idx%12];
    const persona = `〈${stem}${stemPersona[stem]}〉`;
    const kanshi = stem + branch;
    const num = kanshiNumber(stem, branch);

    const updates = [
      {el: etoNoEl,   text: `No.${num}`},
      {el: resultEl,  text: kanshi},
      {el: readingEl, text: stemR + branchR},
      {el: personaEl, text: persona}
    ];

    updates.forEach(({el, text})=>{
      el.classList.add('is-fading-out');
      setTimeout(()=>{
        el.textContent = text || "\u00A0";
        requestAnimationFrame(()=>{
          el.classList.remove('is-fading-out');
          el.classList.add('is-fading-in');
          setTimeout(()=>el.classList.remove('is-fading-in'), 500);
        });
      }, 300);
    });

    updatePanel(num);
  }

  (function init(){
    const t=new Date();
    curYear=t.getFullYear(); curMonth=t.getMonth()+1;
    updateYmLabel();

    if(ymInput.type==="month"){
      ymInput.value=`${curYear}-${String(curMonth).padStart(2,'0')}`;
    }
    for(let d=1; d<=31; d++){ daySel.add(new Option(d,d)); }
    updateDays();
    daySel.value=t.getDate();

    updateResult();
    // 初期表示ではフェードなしで即表示
    panelEl.classList.add('is-visible');

    document.body.classList.remove('is-initializing');

    if(ymInput.type === "month"){
      ymInput.addEventListener('change', ()=>{
        if(!ymInput.value) return;
        const [y,m] = ymInput.value.split('-').map(v=>+v);
        curYear=y; curMonth=m; updateYmLabel(); updateDays(); updateResult();
      });
    }
    daySel.addEventListener('change', updateResult);
  })();

  /* すべてのリンクを別タブで開く（無効リンクは除く） */
  document.querySelectorAll("a:not([aria-disabled='true'])").forEach(a=>{
    if(a.id === 'panelLink') return; // panelLinkは updatePanel 内で個別制御
    a.setAttribute("target","_blank");
    a.setAttribute("rel","noopener noreferrer");
  });
</script>
</body>
</html>
