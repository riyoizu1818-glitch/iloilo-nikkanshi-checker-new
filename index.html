<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>日干支 checker</title>
<style>
  :root{
    --ink:#333; --brand:#ff68b6;
    --field-fg:#555; --field-size:15px; --field-weight:400;
    --field-border:#cfd6e0; --field-radius:8px; --field-height:34px;
    --field-pad-x:9px; --caret-color:#7aa8ff;
    --panel-radius:44px;
  }

  html,body{ margin:0; padding:0; height:100%; -webkit-text-size-adjust:100%; color:var(--ink); overflow:hidden; }
  body{
    font-family:'Hiragino Kaku Gothic ProN', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
    text-align:center;
    position:relative;
  }

  /* ── 背景レイヤー（既定の水彩柄。常に一番下に敷く） ── */
  .bg-base{
    position:fixed; inset:0; z-index:-2;
    background:url('iloiloback.jpg') no-repeat center center;
    background-size:cover;
  }
  /* ── 背景レイヤー（干支のカラースケープ。あるときだけフェードイン） ── */
  .bg-scape{
    position:fixed; inset:0; z-index:-1;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:opacity .8s ease-in-out;
  }
  .bg-scape.is-visible{ opacity:1; }

  /* ── 右上：テキストのヘッダーメニュー ── */
  .headnav{
    width:min(720px,92vw);
    margin:0 auto;
    padding-top:max(8px, env(safe-area-inset-top));
    display:flex;
    justify-content:flex-end;
    align-items:center;
    font-family:'Futura','Avenir Next','Montserrat',sans-serif;
    font-weight:500;
    letter-spacing:.02em;
    font-size:14px;
    color:#666;
    flex-shrink:0;
  }
  .headnav a{
    color:inherit;
    text-decoration:none;
    padding:4px 8px;
    line-height:1;
    background:rgba(255,255,255,.5);
    border-radius:999px;
  }
  .headnav a + a{ margin-left:6px; padding-left:8px; border-left:none; }
  .headnav a:hover{ color:#333; }

  /* ── 本体（画面ぴったり・スクロールなし） ── */
  .wrap{
    height:100svh;
    padding:0 16px calc(10px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; justify-content:center; align-items:center; gap:10px;
    box-sizing:border-box;
  }

  /* ── 統一パネル（角丸長方形1枚） ── */
  .panel{
    width:min(360px,90vw);
    border-radius:var(--panel-radius);
    background:rgba(255,255,255,.88);
    box-shadow:0 8px 24px rgba(0,0,0,.12);
    overflow:hidden;
    flex-shrink:0;
  }

  .panel-top{
    padding:16px 18px 14px;
  }
  .logo{ font-family:'Futura','Avenir Next','Montserrat',sans-serif; font-weight:900; font-size:24px; margin:0; }
  .sub{ font-family:'Futura','Avenir Next','Montserrat',sans-serif; font-weight:400; font-size:12px; margin:1px 0 0; color:#666; }

  .row{ display:flex; gap:7px; align-items:center; justify-content:center; margin-top:10px; }
  .field{
    height:var(--field-height);
    border:1px solid var(--field-border); border-radius:var(--field-radius);
    background:#fff; font-size:var(--field-size); font-weight:var(--field-weight);
    color:var(--field-fg); line-height:1;
  }
  .ym-box{ position:relative; display:inline-flex; align-items:center; gap:7px;
    padding:0 calc(var(--field-pad-x) + 16px) 0 var(--field-pad-x); }
  .ym-year,.ym-month,.ym-suffix{ pointer-events:none; user-select:none; }
  .ym-suffix{ opacity:.9; }
  .ym-caret{ position:absolute; right:8px; top:50%; transform:translateY(-50%);
    font-size:9px; color:var(--caret-color); pointer-events:none; }
  .ym-box input[type="month"]{
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0; border:0; background:transparent; appearance:none; -webkit-appearance:none;
    cursor:pointer;
  }
  .day-box{ position:relative; display:inline-block; padding:0 var(--field-pad-x); }
  .day-box select{
    appearance:none; -webkit-appearance:none; outline:none;
    border:0; background:transparent; color:var(--field-fg);
    font-size:var(--field-size); font-weight:var(--field-weight);
    height:100%; padding-right:30px;
  }
  .day-suffix{ position:absolute; right:20px; top:50%; transform:translateY(-50%);
    font-size:var(--field-size); font-weight:var(--field-weight); color:var(--field-fg); opacity:.9; }
  .day-box::after{ content:"▼"; position:absolute; right:8px; top:50%; transform:translateY(-50%);
    font-size:9px; color:var(--caret-color); pointer-events:none; }

  .eto-no{
    margin-top:12px;
    font-family:'Futura','Avenir Next','Montserrat',sans-serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:.08em;
    color:var(--brand);
    min-height:13px;
    line-height:1.2;
  }
  .result{
    margin-top:3px; font-size:24px; font-weight:700;
    min-height:28px; line-height:1.1;
  }
  .reading{
    margin-top:0; font-size:11px; color:#777;
    min-height:15px; line-height:1.2;
  }
  .persona{
    margin-top:7px; font-size:13px; font-weight:600; color:#222;
    min-height:18px; line-height:1.2;
  }

  .fade-text { transition: opacity .4s ease-in-out, transform .4s ease-in-out; }
  .fade-text.is-fading-out { opacity:0; transform:translateY(5px); }
  .fade-text.is-fading-in  { opacity:1; transform:translateY(0); }
  .is-initializing .fade-text { transition:none !important; }
  .is-initializing .panel-art-wrap { transition:none !important; }

  /* ラベル：Color Scape */
  .scape-label{
    margin:14px 0 8px;
    font-family:'Futura','Avenir Next','Montserrat',sans-serif;
    font-weight:600;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#aaa;
  }

  /* ── イラストエリア（画像の実比率のまま・隙間なく・ひとまわり小さく） ── */
  .panel-art-wrap{
    opacity:1;
    transition:opacity .4s ease-in-out;
    padding:4px 46px 0;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .panel-art{
    width:100%;
    max-width:150px;
    border-radius:16px;
    overflow:hidden;
    background-color:rgba(255,255,255,.35);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,.08);
  }
  .panel-art img{
    width:100%;
    height:auto;
    display:block;
  }
  .panel-art.is-pending{
    aspect-ratio: 4 / 5;
  }
  .pending-msg{
    font-size:12px;
    color:#999;
    font-weight:500;
    letter-spacing:.02em;
  }
  .pending-msg .pin{ font-size:16px; display:block; margin-bottom:3px; }

  .panel-body{
    padding:14px 16px 16px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .panel-link{
    text-decoration:none;
    font-size:12px;
    font-weight:700;
    color:#fff;
    background:var(--brand);
    padding:8px 16px;
    border-radius:999px;
    display:inline-block;
    box-shadow:0 4px 10px rgba(255,104,182,.35);
    white-space:nowrap;
  }
  .panel-link[aria-disabled="true"]{
    background:#cfd6e0;
    color:#888;
    box-shadow:none;
    pointer-events:none;
  }

  .nav{
    flex-shrink:0;
    width:min(360px,90vw);
    text-align:right;
  }
  .nav .to-calendar{
    text-decoration:none; font-size:11px; font-weight:600;
    color:#888; background:rgba(255,255,255,.5); border:1px solid rgba(0,0,0,.12);
    padding:5px 13px; border-radius:999px; display:inline-block;
  }
  .nav .to-calendar:hover{ color:#555; background:rgba(255,255,255,.7); }

  .support-footer { display:none !important; }
</style>
</head>
<body class="is-initializing">

  <div class="bg-base"></div>
  <div class="bg-scape" id="bgScape"></div>

  <nav class="headnav">
    <a href="https://izuchan.com/nikkanshi-checker-guide/">使い方</a>
    <a href="https://izuchan.com/">HOME</a>
  </nav>

  <div class="wrap">

    <div class="panel" id="panel">
      <div class="panel-top">
        <h1 class="logo">ilo.ilo</h1>
        <div class="sub">日干支 checker</div>

        <div class="row">
          <span class="field ym-box">
            <span class="ym-year" id="ymYear">----</span>
            <span class="ym-suffix">年</span>
            <span class="ym-month" id="ymMonth">--</span>
            <span class="ym-suffix">月</span>
            <span class="ym-caret">▼</span>
            <input type="month" id="ymInput" />
          </span>
          <span class="field day-box">
            <select id="day"></select>
            <span class="day-suffix">日</span>
          </span>
        </div>

        <div class="eto-no fade-text" id="etoNo">&nbsp;</div>
        <div class="result  fade-text" id="result">&nbsp;</div>
        <div class="reading fade-text" id="reading">&nbsp;</div>
        <div class="persona fade-text" id="persona">&nbsp;</div>
      </div>

      <div class="scape-label">Color Scape</div>

      <div class="panel-art-wrap" id="panelArtWrap">
        <div class="panel-art" id="panelArt"></div>
        <div class="panel-body">
          <a class="panel-link" id="panelLink" href="#" rel="noopener noreferrer">この景色をひらく</a>
        </div>
      </div>
    </div>

    <div class="nav">
      <a class="to-calendar" href="https://izuchan.com/iloilo-nikkanshi-calendar/">🗓️ 日干支カレンダーへ</a>
    </div>

  </div>

<script>
  const stems = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
  const stemsReading = ["きのえ","きのと","ひのえ","ひのと","つちのえ","つちのと","かのえ","かのと","みずのえ","みずのと"];
  const branches = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
  const branchesReading = ["ね","うし","とら","う","たつ","み","うま","ひつじ","さる","とり","いぬ","い"];
  const stemPersona = {
    "甲":"🌳樹木タイプ","乙":"🪻草花タイプ","丙":"☀️太陽タイプ","丁":"🔥炎タイプ",
    "戊":"⛰️山タイプ","己":"🪏大地タイプ","庚":"🪨岩・鉄塊タイプ","辛":"💍宝石タイプ",
    "壬":"🌊海・大河タイプ","癸":"☔️雨タイプ"
  };

  /* ── 干支番号（甲子=01〜癸亥=60）──
     六十干支の周期そのままの並び順。
     画像ファイル名は「番号.jpg」（例: 丁亥=24 → 24.jpg）で統一。
  */
  function kanshiNumber(stem, branch){
    const stemIdx = stems.indexOf(stem);
    const branchIdx = branches.indexOf(branch);
    for(let n=0; n<60; n++){
      if(n % 10 === stemIdx && n % 12 === branchIdx){ return n + 1; }
    }
    return null;
  }

  const ILLUSTRATIONS_DIR = "illustrations"; // GitHubリポジトリ内のフォルダ名に合わせて変更可

  /* ── 記事が完成した干支の番号だけ、ここに追加してください ──
     例: 24番（丁亥）の記事ができたら 24: "https://izuchan.com/hinoto-i/" を追加。
     未登録の番号は自動的に「準備中」表示になります。
  */
  const etoArticleUrls = {
    24: "#",
    // 17: "https://izuchan.com/kanoe-tatsu/",
  };

  const baseDate = new Date(1984, 2, 31);
  function kanshiIndexFromDate(date){
    const diffDays = Math.floor((date - baseDate)/(1000*60*60*24));
    return (diffDays % 60 + 60) % 60;
  }

  const ymInput = document.getElementById('ymInput');
  const ymYear = document.getElementById('ymYear');
  const ymMonth = document.getElementById('ymMonth');
  const daySel = document.getElementById('day');
  const etoNoEl = document.getElementById('etoNo');
  const resultEl = document.getElementById('result');
  const readingEl = document.getElementById('reading');
  const personaEl = document.getElementById('persona');
  const panelArtWrapEl = document.getElementById('panelArtWrap');
  const panelArtEl = document.getElementById('panelArt');
  const panelLinkEl = document.getElementById('panelLink');
  const bgScapeEl = document.getElementById('bgScape');

  let curYear, curMonth;

  function updateDays(){
    const last = new Date(curYear, curMonth, 0).getDate();
    const keep = +daySel.value || 1;
    daySel.innerHTML='';
    for(let d=1; d<=last; d++){ daySel.add(new Option(d,d)); }
    daySel.value = Math.min(keep, last);
  }
  function updateYmLabel(){
    ymYear.textContent = curYear;
    ymMonth.textContent = curMonth;
  }

  function updatePanel(num){
    const numStr = String(num).padStart(2,'0');
    const url = etoArticleUrls[num];

    panelArtWrapEl.style.opacity = 0;
    bgScapeEl.classList.remove('is-visible');

    setTimeout(()=>{
      if(url){
        panelArtEl.classList.remove('is-pending');
        panelArtEl.innerHTML = `<img src="${ILLUSTRATIONS_DIR}/${numStr}.jpg" alt="No.${num} カラースケープ" />`;
        panelLinkEl.href = url;
        panelLinkEl.textContent = 'この景色をひらく';
        panelLinkEl.removeAttribute('aria-disabled');
        panelLinkEl.setAttribute('target','_blank');
        panelLinkEl.setAttribute('rel','noopener noreferrer');

        // 背景にも同じカラースケープをふわっと反映
        bgScapeEl.style.backgroundImage = `url('${ILLUSTRATIONS_DIR}/${numStr}.jpg')`;
        requestAnimationFrame(()=> bgScapeEl.classList.add('is-visible'));
      } else {
        panelArtEl.classList.add('is-pending');
        panelArtEl.innerHTML = '<div class="pending-msg"><span class="pin">🖌️</span>この景色は制作中です</div>';
        panelLinkEl.textContent = '準備中';
        panelLinkEl.href = '#';
        panelLinkEl.setAttribute('aria-disabled','true');
        panelLinkEl.removeAttribute('target');
        // イラストが無い日は既定の水彩背景にフォールバック（is-visible外したまま）
      }
      panelArtWrapEl.style.opacity = 1;
    }, 220);
  }

  function updateResult(){
    const d = +daySel.value;
    if(!curYear || !curMonth || !d) return;
    const date = new Date(curYear, curMonth-1, d);
    const idx = kanshiIndexFromDate(date);
    const stem=stems[idx%10], branch=branches[idx%12];
    const stemR = stemsReading[idx%10], branchR = branchesReading[idx%12];
    const persona = `〈${stem}${stemPersona[stem]}〉`;
    const kanshi = stem + branch;
    const num = kanshiNumber(stem, branch);

    const updates = [
      {el: etoNoEl,   text: `No.${num}`},
      {el: resultEl,  text: kanshi},
      {el: readingEl, text: stemR + branchR},
      {el: personaEl, text: persona}
    ];

    updates.forEach(({el, text})=>{
      el.classList.add('is-fading-out');
      setTimeout(()=>{
        el.textContent = text || "\u00A0";
        requestAnimationFrame(()=>{
          el.classList.remove('is-fading-out');
          el.classList.add('is-fading-in');
          setTimeout(()=>el.classList.remove('is-fading-in'), 450);
        });
      }, 250);
    });

    updatePanel(num);
  }

  (function init(){
    const t=new Date();
    curYear=t.getFullYear(); curMonth=t.getMonth()+1;
    updateYmLabel();

    if(ymInput.type==="month"){
      ymInput.value=`${curYear}-${String(curMonth).padStart(2,'0')}`;
    }
    for(let d=1; d<=31; d++){ daySel.add(new Option(d,d)); }
    updateDays();
    daySel.value=t.getDate();

    updateResult();

    document.body.classList.remove('is-initializing');

    if(ymInput.type === "month"){
      ymInput.addEventListener('change', ()=>{
        if(!ymInput.value) return;
        const [y,m] = ymInput.value.split('-').map(v=>+v);
        curYear=y; curMonth=m; updateYmLabel(); updateDays(); updateResult();
      });
    }
    daySel.addEventListener('change', updateResult);
  })();

  /* すべてのリンクを別タブで開く（無効リンクは除く） */
  document.querySelectorAll("a:not([aria-disabled='true'])").forEach(a=>{
    if(a.id === 'panelLink') return;
    a.setAttribute("target","_blank");
    a.setAttribute("rel","noopener noreferrer");
  });
</script>
</body>
</html>
